<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Click Test</title></head>
<body style="padding:40px;font-family:sans-serif">
  <h1>Тест без Next.js</h1>
  <p>Нажми на кнопки:</p>
  <br>
  <a href="/" style="display:inline-block;padding:14px 28px;background:red;color:white;text-decoration:none;border-radius:8px;font-size:18px;margin:8px">
    Чистый &lt;a href&gt; — На главную
  </a>
  <br><br>
  <button onclick="alert('РАБОТАЕТ! JavaScript живой')" style="padding:14px 28px;background:green;color:white;border:none;border-radius:8px;font-size:18px;cursor:pointer;margin:8px">
    alert() — проверка JS
  </button>
  <br><br>
  <button onclick="window.location.href='/'" style="padding:14px 28px;background:blue;color:white;border:none;border-radius:8px;font-size:18px;cursor:pointer;margin:8px">
    window.location — На главную
  </button>
</body>
</html>
